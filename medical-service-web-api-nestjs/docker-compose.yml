services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=mongodb://admin:123123@db:27017/medical_db?authSource=admin&replicaSet=rs0
    depends_on:
      - db
    networks:
      - app-network
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev
  db:
    image: mongo:latest
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=123123
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
    healthcheck:
      test: >
        mongosh --quiet --eval "
        try {
          rs.status();
        } catch (e) {
          rs.initiate({_id:'rs0',members:[{_id:0,host:'db:27017'}]});
        }"
      interval: 10s
      timeout: 10s
      start_period: 40s
networks:
  app-network:
    driver: bridge
volumes:
  mongo-data: